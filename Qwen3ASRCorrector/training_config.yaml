# ── Model ─────────────────────────────────────────────────────────────────────
model_name: "Qwen/Qwen3-ASR-0.6B"

# ── Data ──────────────────────────────────────────────────────────────────────
# Multiple sources with per-source integer repeat weights.
# weight=N means each training example from that source appears N times per epoch.
# Weights are applied only to training; the val split always uses weight=1.
# 5% of audio files are held out automatically for validation (file-level split).
val_split_ratio: 0.05

train_data_paths:
  - path: "../SpeechLMCorrector/data/synthesized_data_v3/waihu_qwen3asr_train_dedup.jsonl"
    weight: 3  # ~16k samples × 2 — upweighted to balance with larger KeSpeech/AISHELL sets
  - path: "../SpeechLMCorrector/data/synthesized_data_v3/kespeech_qwen3asr_train_20000_dedup_rmobv.jsonl"
    weight: 1  # ~31k samples
  - path: "../SpeechLMCorrector/data/synthesized_data_v3/aishell_qwen3asr_train_20000_dedup_rmobv.jsonl"
    weight: 1  # ~30k samples

output_dir: "/data/mino/model_ckpts/qwen3asr_corrector_v1/"
seed: 42

# ── Training ──────────────────────────────────────────────────────────────────
num_train_epochs: 12
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
warmup_ratio: 0.05
lr_scheduler_type: "cosine"
max_grad_norm: 0.5
dataloader_num_workers: 4
eval_strategy: "steps"
eval_steps: 300
save_steps: 300
save_total_limit: 3
logging_steps: 10
report_to: "none"
max_seq_length: 1024

# ── LoRA ──────────────────────────────────────────────────────────────────────
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - "q_proj"
  - "k_proj"
  - "v_proj"
  - "o_proj"
  - "gate_proj"
  - "up_proj"
  - "down_proj"

# ── Encoder ───────────────────────────────────────────────────────────────────
freeze_encoder: true
